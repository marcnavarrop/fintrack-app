  const [unlocked,setUnlocked]=useState(false);
  const [correctPin,setCorrectPin]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [blurred,setBlurred]=useState(false);
  const [showBackup,setShowBackup]=useState(false);
  const [saveStatus,setSaveStatus]=useState('idle');
  const [theme,setTheme]=useState(()=>localStorage.getItem('fintrack-theme')||'dark');
  const [data,setData]=useState(INIT);

  // Apply theme
  C = theme==='dark' ? {...DARK} : {...LIGHT};
  document.body.style.background = C.bg;

  // ── Estats de càrrega ─────────────────────────────────────────────────────
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState('');
  const [userHasEdited, setUserHasEdited] = useState(false);

  // ── Check auth on mount ───────────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try {
        const user = await sbGetUser();
        setAuthUser(user);
      } catch {}
      setAuthReady(true);
    })();
    // Listen for auth changes
    const {data:{subscription}} = sbClient.auth.onAuthStateChange((_,session)=>{
      setAuthUser(session?.user||null);
      if(!session?.user) {setUnlocked(false);setCorrectPin(null);}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // ── Auto-actualitza el dia 1 de cada mes ─────────────────────────────────
  useEffect(()=>{
    if(!loaded) return;
    const now = new Date();
    const mk = mesKey();
    const isDay1 = now.getDate() === 1;
    // Només a partir de juny 2026
    const isAfterJun2026 = now >= new Date('2026-06-01');
    const lastUpdate = data._lastMonthUpdate;
    if(lastUpdate === mk) return; // ja processat aquest mes

    let updates = {_lastMonthUpdate: mk};

    // Redueix deutes (només dia 1 i a partir de juny 2026)
    if(isDay1 && isAfterJun2026) {
      const bensActualitzats = data.bens.map(b=>{
        if(!b.mensualitat || b.mensualitat<=0 || !b.deute || b.deute<=0) return b;
        return {...b, deute: Math.max(0, Math.round((b.deute-b.mensualitat)*100)/100)};
      });
      updates.bens = bensActualitzats;
    }

    // Desa snapshot del mes anterior (dia 1 de cada mes)
    if(isDay1) {
      const prevDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
      const prevMk = mesKey(prevDate);
      const snapshots2 = data.snapshotMesos||{};
      if(!snapshots2[prevMk]) {
        const iM = g => g.periodicitat==='anual' ? g.import/12 : g.import;
        const s2 = {
          ingressos: (data.historialNomines||{})[prevMk]||data.ingressos,
          totalInv: (data.inversions||[]).reduce((s,i)=>s+i.valor,0),
          totalBens: (data.bens||[]).reduce((s,b)=>s+b.valorActual,0),
          totalDeute: (data.bens||[]).reduce((s,b)=>s+(b.deute||0),0),
          totalFixes: (data.gastosFixes||[]).reduce((s,g)=>s+iM(g),0),
          totalVars: Object.values(data.historialVariables?.[prevMk]||{}).reduce((s,v)=>s+v,0),
          cash: data.cash||0,
          guanyInv: (data.inversions||[]).reduce((s,i)=>s+(i.valor-i.cost),0),
          pctInv: gainPct((data.inversions||[]).reduce((s,i)=>s+i.valor,0),(data.inversions||[]).reduce((s,i)=>s+i.cost,0)),
          patrimoni: Math.round((data.inversions||[]).reduce((s,i)=>s+i.valor,0)+(data.bens||[]).reduce((s,b)=>s+b.valorActual,0)-(data.bens||[]).reduce((s,b)=>s+(b.deute||0),0)+(data.cash||0))
        };
        updates.snapshotMesos = {...snapshots2, [prevMk]: s2};
      }
    }

    // Desa punt d'evolució del patrimoni (dia 1 de cada mes)
    if(isDay1) {
      const mesAbrN = now.toLocaleString('ca-ES',{month:'short'}).slice(0,3)+' '+now.getFullYear().toString().slice(2);
      const evoArr = data.evolucioPat||[];
      const totalPatrimoni = Math.round(
        (data.inversions||[]).reduce((s,i)=>s+i.valor,0) +
        (data.bens||[]).reduce((s,b)=>s+b.valorActual,0) -
        (data.bens||[]).reduce((s,b)=>s+(b.deute||0),0) +
        (data.cash||0)
      );
      const jaExisteix = evoArr.some(e=>e.mes===mesAbrN);
      if(!jaExisteix && totalPatrimoni>0) {
        updates.evolucioPat = [...evoArr.slice(-23), {mes:mesAbrN, valor:totalPatrimoni}];
      }
    }

    setDataSafe(d=>({...d,...updates}));
  },[loaded]);

  // ── Càrrega inicial des de Supabase (quan hi ha usuari autenticat) ─────────
  useEffect(()=>{
    if(!authUser) return;
    setLoaded(false);
    (async()=>{
      try {
        const d = await SB_LOAD();
        if(d && typeof d.ingressos !== 'undefined') {
          setData({...INIT,...d});
          setCorrectPin(d.pin||DEFAULT_PIN);
        } else {
          setData(INIT);
          setCorrectPin(DEFAULT_PIN);
        }
        setLoaded(true);
      } catch(e) {
        setLoadError('No es pot connectar a Supabase: '+e.message);
        setCorrectPin(DEFAULT_PIN);
        setLoaded(true);
      }
    })();
  },[authUser]);

  // ── Auto-desa cada canvi a Supabase (debounce 1s) ─────────────────────────
  const setDataSafe = (updater) => {
    if(loaded) setUserHasEdited(true);
    setData(updater);
  };

  useEffect(()=>{
    if(!loaded || !userHasEdited) return;
    setSaveStatus('saving');
    const t = setTimeout(async()=>{
      try {
        await SB_SAVE(data);
        setSaveStatus('ok');
      } catch(e) {
        setSaveStatus('error');
        console.error('Save error:', e);
      }
    }, 1000);
    return ()=>clearTimeout(t);
  },[data, loaded, userHasEdited]);

  // ── Backup automàtic cada divendres ───────────────────────────────────────
  useEffect(()=>{
    if(!loaded || !userHasEdited) return;
    const now = new Date();
    const isFriday = now.getDay() === 5;
    const lastBackup = localStorage.getItem('fintrack-last-backup');
    const today = now.toISOString().slice(0,10);
    if(isFriday && lastBackup !== today) {
      // Auto-download backup
      setTimeout(()=>{
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json],{type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'fintrack_backup_'+today+'.json';
        a.click();
        URL.revokeObjectURL(url);
        localStorage.setItem('fintrack-last-backup', today);
      }, 3000);
    }
  },[loaded]);

  const [hBlur,setHBlur]=useState(false);
  const [hBackup,setHBackup]=useState(false);

  // Comprovant autenticació
  if(!authReady) return e('div',{style:{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}},
    e('div',{style:{textAlign:'center'}},
      e('div',{style:{fontSize:26,fontWeight:900,marginBottom:12}},e('span',{style:{color:C.accent}},'fin'),e('span',{style:{color:C.white}},'track')),
      e('div',{style:{width:28,height:28,border:'3px solid '+C.border,borderTopColor:C.accent,borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto'}})
    )
  );
  // No autenticat → pantalla login/registre
  if(!authUser) return e(AuthScreen,{onAuth:async()=>{const u=await sbGetUser();setAuthUser(u);}});
  // Autenticat però PIN no carregat
  if(correctPin===null) return e('div',{style:{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}},
    e('div',{style:{textAlign:'center'}},
      e('div',{style:{fontSize:26,fontWeight:900,marginBottom:12}},e('span',{style:{color:C.accent}},'fin'),e('span',{style:{color:C.white}},'track')),
      e('div',{style:{width:28,height:28,border:'3px solid '+C.border,borderTopColor:C.accent,borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto'}})
    )
  );
  if(!unlocked) return e(PinScreen,{onUnlock:()=>setUnlocked(true),correctPin});

  if(!loaded) return e('div',{style:{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,fontFamily:"'Sora',sans-serif"}},
    e('div',{style:{fontSize:26,fontWeight:900}},e('span',{style:{color:C.accent}},'fin'),e('span',{style:{color:C.white}},'track')),
    e('div',{style:{width:32,height:32,border:'3px solid '+C.border,borderTopColor:C.accent,borderRadius:'50%',animation:'spin .8s linear infinite'}}),
    e('div',{style:{color:C.dim,fontSize:11,letterSpacing:2}},'CARREGANT...')
  );

  return e(ThemeCtx.Provider,{value:theme},e(BlurCtx.Provider,{value:blurred},
    e('div',{key:theme,style:{background:C.bg,minHeight:'100vh',fontFamily:"'Sora',system-ui,sans-serif",color:C.text,maxWidth:900,margin:'0 auto',paddingBottom:60}},
      // Header
      e('div',{style:{padding:'12px 16px 10px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,background:C.bg,zIndex:100}},
        e('div',null,
          e('div',{style:{fontSize:17,fontWeight:900,letterSpacing:-.5}},
            e('span',{style:{color:C.accent}},'fin'),e('span',{style:{color:C.white}},'track')
          ),
          e('div',{style:{display:'flex',alignItems:'center',gap:4}},
            e('div',{style:{color:C.dim,fontSize:8,letterSpacing:1.5,textTransform:'uppercase'}},'Gestor financer personal'),
            saveStatus==='saving' && e('span',{style:{color:C.accent,fontSize:8}},' ● desant...'),
            saveStatus==='ok' && e('span',{style:{color:C.green,fontSize:8}},' ✓ desat'),
            saveStatus==='error' && e('span',{style:{color:C.red,fontSize:8}},' ✗ error desant'),
            loadError && e('span',{style:{color:C.red,fontSize:8}},' ⚠ '+loadError)
          )
        ),
        e('div',{style:{display:'flex',gap:6,alignItems:'center'}},
          // Blur
          e('button',{
            onClick:()=>setBlurred(b=>!b),
            onMouseEnter:()=>setHBlur(true),onMouseLeave:()=>setHBlur(false),
            title:blurred?'Mostrar imports':'Ocultar imports',
            style:{background:blurred?C.accentDim:'transparent',border:`1px solid ${blurred?C.accent+'55':(hBlur?C.accent+'66':C.border)}`,color:blurred?C.accent:(hBlur?C.accent:C.dim),borderRadius:7,width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,transition:'all .2s'}
          },blurred?'🙈':'👁️'),
          // Backup
          e('button',{
            onClick:()=>setShowBackup(true),
            onMouseEnter:()=>setHBackup(true),onMouseLeave:()=>setHBackup(false),
            title:'Backup / Restaurar',
            style:{background:'transparent',border:`1px solid ${hBackup?C.yellow+'77':C.border}`,color:hBackup?C.yellow:C.dim,borderRadius:7,width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,transition:'all .2s'}
          },'💾'),
          // Theme toggle
          e('button',{
            onClick:()=>setTheme(t=>t==='dark'?'light':'dark'),
            title:'Mode '+(theme==='dark'?'clar':'fosc'),
            style:{background:'transparent',border:'1px solid '+C.border,color:C.dim,borderRadius:7,width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,transition:'all .2s'}
          },theme==='dark'?'☀️':'🌙'),
          // Reset removed - see backup modal Dades tab
        )
      ),
      // Tabs
      e('div',{style:{display:'flex',gap:0,padding:'0 8px',overflowX:'auto',borderBottom:'2px solid '+C.border,scrollbarWidth:'none',msOverflowStyle:'none'}},
        TABS.map(t=>e('button',{key:t.id,onClick:()=>setTab(t.id),
          style:{
            background:'transparent',
            color:tab===t.id?C.accent:C.dim,
            border:'none',
            borderBottom:tab===t.id?'3px solid '+C.accent:'3px solid transparent',
            marginBottom:'-2px',
            padding:'14px 18px',
            cursor:'pointer',
            fontWeight:tab===t.id?800:600,
            fontSize:13,
            whiteSpace:'nowrap',
            transition:'all .15s',
            fontFamily:'inherit',
            letterSpacing:.1
          }
        },t.icon+' '+t.label))
      ),
      // Content
      e('div',{style:{padding:'16px 14px'}},
        tab==='dashboard' && e(Dashboard,{data,setData:setDataSafe,setTab}),
        tab==='fixes' && e(GastosFixes,{data,setData:setDataSafe}),
        tab==='variables' && e(GastosVariables,{data,setData:setDataSafe}),
        tab==='inversions' && e(Inversions,{data,setData:setDataSafe}),
        tab==='bens' && e(Bens,{data,setData:setDataSafe}),
        tab==='fire' && e(Fire,{data,setData:setDataSafe})
      ),
      showBackup && e(BackupModal,{data,setData:setDataSafe,onClose:()=>setShowBackup(false)})
    )
  ));
}

// Mount
document.getElementById('root').innerHTML = '';
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
} catch(err) {
  document.getElementById('root').innerHTML = 
    '<div style="padding:24px;color:#ff4d6d;font-family:monospace;font-size:12px;background:#0a0e1a;min-height:100vh;white-space:pre-wrap">' +
    '<div style="font-size:22px;font-weight:900;margin-bottom:16px;font-family:sans-serif"><span style="color:#00e5ff">fin</span><span style="color:#fff">track</span> — Error</div>' +
    '<b>' + err.name + ':</b> ' + err.message + '\n\n' +
    (err.stack||'').replace(/</g,'&lt;') +
    '</div>';
  console.error(err);
}
} // end startApp
</script>
</body>
</html>
