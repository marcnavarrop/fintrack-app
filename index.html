// ── Pure CSS/SVG Charts (no external library) ──────────────────────────────

function DonutChart({data, size=100}) {
  if(!data||data.length===0) return null;
  const total = data.reduce((s,d)=>s+(d.value||0),0);
  if(total===0) return null;
  const r=38, cx=50, cy=50, circumf=2*Math.PI*r;
  let offset=0;
  const slices = data.map((d,i)=>{
    const pct=(d.value||0)/total;
    const dash=pct*circumf;
    const slice=e('circle',{key:i,cx,cy,r,fill:'none',stroke:d.color||'#444',
      strokeWidth:12,strokeDasharray:dash+' '+(circumf-dash),
      strokeDashoffset:-offset,style:{transition:'stroke-dasharray .5s'}});
    offset+=dash;
    return slice;
  });
  return e('svg',{width:size,height:size,viewBox:'0 0 100 100'},slices);
}

function BarChartSimple({data, dataKeys, colors, height=150}) {
  if(!data||data.length===0) return null;
  const allVals = data.flatMap(d=>dataKeys.map(k=>d[k]||0));
  const max = Math.max(...allVals, 1);
  const barW = Math.floor(90/data.length/dataKeys.length);
  const gap = Math.floor(10/data.length);
  return e('div',{style:{height,display:'flex',alignItems:'flex-end',gap:2,padding:'0 4px',overflowX:'auto'}},
    data.map((d,i)=>e('div',{key:i,style:{display:'flex',alignItems:'flex-end',gap:2,flex:1,minWidth:0}},
      dataKeys.map((k,j)=>e('div',{key:k,style:{flex:1,minWidth:6,background:colors[j]||C.accent,
        height:Math.max(4,Math.round(((d[k]||0)/max)*(height-20)))+'px',borderRadius:'3px 3px 0 0',
        transition:'height .4s ease',opacity:.9,cursor:'default',position:'relative',title:d.nom+': '+fmt(d[k]||0)}}))
    ))
  );
}

function HBarChart({data, height=160}) {
  if(!data||data.length===0) return null;
  const totalSum = data.reduce((s,d)=>s+(d.total||0),0);
  const max = Math.max(...data.map(d=>d.total||0), 1);
  return e('div',{style:{display:'flex',flexDirection:'column',gap:8,padding:'4px 0'}},
    data.map((d,i)=>{
      const pct = totalSum>0?Math.round((d.total||0)/totalSum*100):0;

          )

        )
      );
    })
  );
}

function AreaChartSimple({data, height=160}) {
  if(!data||data.length===0) return e('div',{style:{height,display:'flex',alignItems:'center',justifyContent:'center',color:C.dim,fontSize:11}},'Sense dades encara');
  const vals = data.map(d=>d.valor||0);
  const maxV = Math.max(...vals,1);
  const minV = Math.min(...vals,0);
  const range = maxV-minV||1;
  const w=320, h=height-36, pad=8;
  const pts = data.map((d,i)=>({
    x: Math.round(pad + i*((w-pad*2)/(data.length-1||1))),
    y: Math.round(h - ((d.valor-minV)/range)*(h-10) + 5),
    val: d.valor, mes: d.mes
  }));
  const linePts = pts.map(p=>p.x+','+p.y).join(' ');
  const areaPts = pts[0].x+','+(h+5)+' '+linePts+' '+pts[pts.length-1].x+','+(h+5);
  const last = pts[pts.length-1];
  const prev = pts[pts.length-2];
  const trend = prev ? last.val - prev.val : 0;
  return e('div',{style:{position:'relative'}},
    e('svg',{width:'100%',height,viewBox:'0 0 '+w+' '+height,preserveAspectRatio:'xMidYMid meet'},
      e('defs',null,
        e('linearGradient',{id:'ag2',x1:'0',y1:'0',x2:'0',y2:'1'},
          e('stop',{offset:'0%',stopColor:C.accent,stopOpacity:.3}),
          e('stop',{offset:'100%',stopColor:C.accent,stopOpacity:.02})
        )
      ),
      // Grid lines
      [0.25,0.5,0.75,1].map(f=>e('line',{key:f,
        x1:pad,y1:Math.round(h*(1-f)+5),x2:w-pad,y2:Math.round(h*(1-f)+5),
        stroke:C.border,strokeWidth:.5,strokeDasharray:'3 3'
      })),
      // Y axis labels
      [0.5,1].map(f=>e('text',{key:f,
        x:pad,y:Math.round(h*(1-f)+4),fill:C.dim,fontSize:7,textAnchor:'start'
      },fmt(minV+range*f,0))),
      // Area fill
      e('polygon',{points:areaPts,fill:'url(#ag2)'}),
      // Line
      e('polyline',{points:linePts,fill:'none',stroke:C.accent,strokeWidth:2.5,strokeLinejoin:'round',strokeLinecap:'round'}),
      // Dots + labels
      pts.map((p,i)=>e('g',{key:i},
        e('circle',{cx:p.x,cy:p.y,r:i===pts.length-1?5:3,fill:i===pts.length-1?C.accent:C.bg,stroke:C.accent,strokeWidth:i===pts.length-1?0:1.5}),
        e('text',{x:p.x,y:h+18,textAnchor:'middle',fill:C.dim,fontSize:8},p.mes),
        i===pts.length-1 && e('text',{x:p.x,y:p.y-10,textAnchor:'middle',fill:C.accent,fontSize:8,fontWeight:'bold'},
          fmt(p.val,0)
        )
      ))
    ),
    // Trend badge
    trend!==0 && e('div',{style:{position:'absolute',top:4,right:4,background:(trend>0?C.green:C.red)+'22',color:trend>0?C.green:C.red,borderRadius:5,padding:'2px 6px',fontSize:9,fontWeight:700}},
      (trend>0?'▲ +':'▼ ')+fmt(trend,0),' vs mes anterior'
    )
  );
}



// ── Supabase Storage (única font de veritat) ─────────────────────────────────
const SB_LOAD = async () => {
  const user = await sbGetUser();
  if(!user) throw new Error('No autenticat');
  const token = (await sbClient.auth.getSession()).data.session?.access_token;
  const r = await fetch(SB_URL+'/rest/v1/fintrack_users?id=eq.'+user.id+'&select=data,updated_at', {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  const rows = await r.json();
  if(!rows.length || !rows[0].data) return null;
  return JSON.parse(rows[0].data);
};

const SB_SAVE = async (d) => {
  const user = await sbGetUser();
  if(!user) throw new Error('No autenticat');
  const token = (await sbClient.auth.getSession()).data.session?.access_token;
  const r = await fetch(SB_URL+'/rest/v1/fintrack_users', {
    method:'POST',
    headers:{
      'apikey':SB_KEY,
      'Authorization':'Bearer '+token,
      'Content-Type':'application/json',
      'Prefer':'resolution=merge-duplicates'
    },
    body: JSON.stringify({id:user.id, data:JSON.stringify(d), updated_at:new Date().toISOString()})
  });
  if(!r.ok) { const e=await r.text(); throw new Error(e); }
  return true;
};

function Dashboard({data,setData,setTab=()=>{}}) {
  const avuiKey = mesKey();
  const snapshots = data.snapshotMesos||{};

  // Mesos disponibles: actual + tots els que tenen snapshot
  const mesosDisp = [...new Set([...Object.keys(snapshots), avuiKey])].sort();
  const [mesSelec, setMesSelec] = useState(avuiKey);
  const mesIdx = mesosDisp.indexOf(mesSelec);
  const esActual = mesSelec === avuiKey;

  const [editIng,setEditIng]=useState(false);
  const [tempIng,setTempIng]=useState('');
  const [editCash,setEditCash]=useState(false);
  const [tempCash,setTempCash]=useState('');
  const [modalObj,setModalObj]=useState(null);
  const [fObj,setFObj]=useState({nom:'',meta:'',actual:'',icona:'🎯'});
  const [errObj,setErrObj]=useState({});

  // Dades del mes seleccionat (live si actual, snapshot si passat)
  const iMensual = g => g.periodicitat==='anual' ? g.import/12 : g.import;
  const snap = esActual ? null : snapshots[mesSelec];

  const totalInv   = esActual ? data.inversions.reduce((s,i)=>s+i.valor,0)     : (snap?.totalInv||0);
  const totalCash  = esActual ? (data.cash||0)                                  : (snap?.cash||0);
  const totalBens  = esActual ? data.bens.reduce((s,b)=>s+b.valorActual,0)      : (snap?.totalBens||0);
  const totalDeute = esActual ? data.bens.reduce((s,b)=>s+(b.deute||0),0)       : (snap?.totalDeute||0);
  const totalFixes = esActual ? data.gastosFixes.reduce((s,g)=>s+iMensual(g),0) : (snap?.totalFixes||0);
  const totalVars  = esActual
    ? Object.values(data.historialVariables?.[avuiKey]||{}).reduce((s,v)=>s+v,0)
    : (snap?.totalVars||0);
  const nomina     = esActual ? data.ingressos : (snap?.ingressos||data.ingressos);
  const estalvi    = nomina - totalFixes - totalVars;
  const patrimoni  = totalInv + totalBens - totalDeute + totalCash;
  const guanyInv   = esActual ? data.inversions.reduce((s,i)=>s+(i.valor-i.cost),0) : (snap?.guanyInv||0);
  const pctInv     = esActual ? gainPct(totalInv, data.inversions.reduce((s,i)=>s+i.cost,0)) : (snap?.pctInv||0);

  // Guardar snapshot del mes actual (es crida quan es canvia de mes)
  const desarSnapshot = (mk) => {
    const s = {
      ingressos: data.ingressos,
      totalInv: data.inversions.reduce((s,i)=>s+i.valor,0),
      totalBens: data.bens.reduce((s,b)=>s+b.valorActual,0),
      totalDeute: data.bens.reduce((s,b)=>s+(b.deute||0),0),
      totalFixes: data.gastosFixes.reduce((s,g)=>s+iMensual(g),0),
      totalVars: Object.values(data.historialVariables?.[mk]||{}).reduce((s,v)=>s+v,0),
      cash: data.cash||0,
      guanyInv: data.inversions.reduce((s,i)=>s+(i.valor-i.cost),0),
      pctInv: gainPct(data.inversions.reduce((s,i)=>s+i.valor,0), data.inversions.reduce((s,i)=>s+i.cost,0)),
      patrimoni: Math.round(data.inversions.reduce((s,i)=>s+i.valor,0) + data.bens.reduce((s,b)=>s+b.valorActual,0) - data.bens.reduce((s,b)=>s+(b.deute||0),0) + (data.cash||0))
    };
    setData(d=>({...d,snapshotMesos:{...(d.snapshotMesos||{}),[mk]:s}}));
  };

  const distribTotal = totalInv + Math.max(0,totalBens-totalDeute) + totalCash;
  const distrib = [
    {name:'Inversions',value:totalInv,color:C.accent,pct:distribTotal>0?Math.round(totalInv/distribTotal*100):0},
    {name:'Bens nets',value:Math.max(0,totalBens-totalDeute),color:C.purple,pct:distribTotal>0?Math.round(Math.max(0,totalBens-totalDeute)/distribTotal*100):0},
    {name:'Cash',value:totalCash,color:C.green,pct:distribTotal>0?Math.round(totalCash/distribTotal*100):0},
  ].filter(d=>d.value>0);

  const now2 = new Date();
  const mesAbr = now2.toLocaleString('ca-ES',{month:'short'}).slice(0,3)+' '+now2.getFullYear().toString().slice(2);
  const evo = data.evolucioPat||[];
  const evoActual = evo.length && evo[evo.length-1].mes===mesAbr
    ? evo.map((x,i)=>i===evo.length-1?{...x,valor:Math.round(patrimoni)}:x)
    : [...evo.slice(-11),{mes:mesAbr,valor:Math.round(patrimoni)}];

  const desarObj = () => {
    const er={};
    if(!fObj.nom.trim())er.nom='Obligatori';
    if(!fObj.meta||isNaN(fObj.meta)||+fObj.meta<=0)er.meta='Import vàlid';
    if(Object.keys(er).length){setErrObj(er);return;}
    const obj={id:modalObj==='nou'?uid():modalObj,nom:fObj.nom.trim(),meta:+fObj.meta,actual:+fObj.actual||0,icona:fObj.icona||'🎯'};
    setData(d=>({...d,objectius:modalObj==='nou'?[...d.objectius,obj]:d.objectius.map(o=>o.id===modalObj?obj:o),evolucioPat:evoActual}));
    setModalObj(null);
  };

  return e('div',null,
    // Selector de mes
    e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:14,background:C.surface,borderRadius:10,padding:'8px 12px',border:'1px solid '+C.border}},
      e('button',{onClick:()=>setMesSelec(mesosDisp[mesIdx-1]),disabled:mesIdx===0,
        style:{background:'none',border:'1px solid '+C.border,color:mesIdx===0?C.border:C.dim,borderRadius:7,width:28,height:28,cursor:mesIdx===0?'default':'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}},'‹'),
      e('div',{style:{flex:1,textAlign:'center'}},
        e('div',{style:{color:esActual?C.accent:C.text,fontWeight:700,fontSize:13}},
          esActual ? 'Mes actual — '+mesLabel(avuiKey) : mesLabel(mesSelec)
        ),
        !esActual && e('div',{style:{color:C.dim,fontSize:9}},'foto del mes · clica ‹ › per navegar')
      ),
      e('button',{onClick:()=>setMesSelec(mesosDisp[mesIdx+1]),disabled:mesIdx===mesosDisp.length-1,
        style:{background:'none',border:'1px solid '+C.border,color:mesIdx===mesosDisp.length-1?C.border:C.dim,borderRadius:7,width:28,height:28,cursor:mesIdx===mesosDisp.length-1?'default':'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}},'›')
    ),

    // Hero patrimoni
    e('div',{style:{marginBottom:16,paddingBottom:16,borderBottom:'1px solid '+C.border}},
      e('div',{style:{color:C.dim,fontSize:10,letterSpacing:1.5,textTransform:'uppercase',marginBottom:2}},
        esActual?'Patrimoni net total':'Patrimoni net — '+mesLabel(mesSelec)
      ),
      e('div',{style:{fontSize:32,fontWeight:900,color:C.white,fontFamily:"'DM Mono',monospace",letterSpacing:-1}},
        e(Money,null,fmt(patrimoni))
      ),
      e('div',{style:{color:pctInv>=0?C.green:C.red,fontSize:11,marginTop:2}},
        (pctInv>=0?'▲':'▼')+' '+Math.abs(pctInv).toFixed(1)+'% rendiment inversions · '+(guanyInv>=0?'+':''),
        e(Money,null,fmt(guanyInv)),' total'
      )
    ),

    // Nòmina + estalvi
    e(Card,{style:{marginBottom:12,padding:'12px 14px'}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        e('div',null,
          e('div',{style:{color:C.dim,fontSize:10,letterSpacing:.8,textTransform:'uppercase',marginBottom:3}},'💼 Nomina mensual'),
          esActual && editIng
            ? e('div',{style:{display:'flex',alignItems:'center',gap:7,marginTop:3}},
                e('input',{value:tempIng,onChange:ev=>setTempIng(ev.target.value),type:'number',autoFocus:true,
                  onKeyDown:ev=>{
                    if(ev.key==='Enter'){const v=parseFloat(tempIng);if(!isNaN(v)&&v>=0){const mk=mesKey();setData(d=>({...d,ingressos:v,historialNomines:{...(d.historialNomines||{}),[mk]:v}}));}setEditIng(false);}
                    if(ev.key==='Escape')setEditIng(false);
                  },
                  style:{background:C.bg,border:'1px solid '+C.accent,borderRadius:7,color:C.text,padding:'6px 10px',fontSize:14,width:110,outline:'none',fontFamily:'monospace',fontWeight:700}}),
                e('button',{onClick:()=>{const v=parseFloat(tempIng);if(!isNaN(v)&&v>=0){const mk=mesKey();setData(d=>({...d,ingressos:v,historialNomines:{...(d.historialNomines||{}),[mk]:v}}));}setEditIng(false);},
                  style:{background:C.accent,border:'none',color:C.bg,borderRadius:7,padding:'6px 10px',cursor:'pointer',fontSize:12,fontWeight:800,fontFamily:'inherit'}},'OK'),
                e('button',{onClick:()=>setEditIng(false),style:{background:'none',border:'none',color:C.dim,cursor:'pointer',fontSize:14}},'✕')
              )
            : e('div',{style:{display:'flex',alignItems:'center',gap:8,marginTop:2}},
                e('span',{style:{color:C.green,fontSize:18,fontWeight:800,fontFamily:'monospace'}},e(Money,null,fmt(nomina))),
                esActual && e('button',{onClick:()=>{setTempIng(String(nomina));setEditIng(true);},
                  style:{background:C.accentDim,border:'1px solid '+C.accent+'33',color:C.accent,borderRadius:6,padding:'2px 8px',cursor:'pointer',fontSize:10,fontFamily:'inherit',fontWeight:600}},'Editar')
              )
        ),
        e('div',{style:{textAlign:'right'}},
          e('div',{style:{color:C.dim,fontSize:10}},'Taxa estalvi'),
          e('div',{style:{color:estalvi>0?C.green:C.red,fontSize:16,fontWeight:800,fontFamily:'monospace'}},
            (nomina>0?Math.round((estalvi/nomina)*100):0)+'%'
          ),
          e('div',{style:{color:C.dim,fontSize:10}},e(Money,null,fmt(estalvi)),'/mes')
        )
      ),

    ),

    // Cash card
    e(Card,{style:{marginBottom:12,padding:'12px 14px'}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        e('div',null,
          e('div',{style:{color:C.dim,fontSize:10,letterSpacing:.8,textTransform:'uppercase',marginBottom:3}},'💰 Cash disponible'),
          esActual && editCash
            ? e('div',{style:{display:'flex',alignItems:'center',gap:7,marginTop:3}},
                e('input',{value:tempCash,onChange:ev=>setTempCash(ev.target.value),type:'number',autoFocus:true,
                  onKeyDown:ev=>{if(ev.key==='Enter'){const v=parseFloat(tempCash);if(!isNaN(v)&&v>=0)setData(d=>({...d,cash:v}));setEditCash(false);}if(ev.key==='Escape')setEditCash(false);},
                  style:{background:C.bg,border:'1px solid '+C.accent,borderRadius:7,color:C.text,padding:'6px 10px',fontSize:14,width:120,outline:'none',fontFamily:'monospace',fontWeight:700}}),
                e('button',{onClick:()=>{const v=parseFloat(tempCash);if(!isNaN(v)&&v>=0)setData(d=>({...d,cash:v}));setEditCash(false);},
                  style:{background:C.accent,border:'none',color:C.bg,borderRadius:7,padding:'6px 10px',cursor:'pointer',fontSize:12,fontWeight:800,fontFamily:'inherit'}},'OK'),
                e('button',{onClick:()=>setEditCash(false),style:{background:'none',border:'none',color:C.dim,cursor:'pointer',fontSize:14}},'✕')
              )
            : e('div',{style:{display:'flex',alignItems:'center',gap:8,marginTop:2}},
                e('span',{style:{color:C.green,fontSize:18,fontWeight:800,fontFamily:'monospace'}},e(Money,null,fmt(totalCash))),
                esActual && e('button',{onClick:()=>{setTempCash(String(data.cash||0));setEditCash(true);},
                  style:{background:C.accentDim,border:'1px solid '+C.accent+'33',color:C.accent,borderRadius:6,padding:'2px 8px',cursor:'pointer',fontSize:10,fontFamily:'inherit',fontWeight:600}},'Editar')
              )
        ),
        e('div',{style:{textAlign:'right'}},
          e('div',{style:{color:C.dim,fontSize:10}},'del patrimoni'),
          e('div',{style:{color:C.green,fontSize:16,fontWeight:800,fontFamily:'monospace'}},
            (distribTotal>0?Math.round(totalCash/distribTotal*100):0)+'%'
          )
        )
      )
    ),

    // Stats grid (sense estalvi net)
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:9,marginBottom:12}},
      e(StatBox,{label:'Fixes',value:e(Money,null,fmt(totalFixes)),sub:'mensual',color:C.red,icon:'📌',onClick:esActual?()=>setTab('fixes'):null}),
      e(StatBox,{label:'Variables',value:e(Money,null,fmt(totalVars)),sub:mesLabel(mesSelec),color:C.orange,icon:'📊',onClick:esActual?()=>setTab('variables'):null}),
      e(StatBox,{label:'Inversions',value:e(Money,null,fmt(totalInv)),sub:e('span',null,(guanyInv>=0?'+':''),e(Money,null,fmt(guanyInv))),color:C.accent,icon:'📈',onClick:esActual?()=>setTab('inversions'):null}),
      e(StatBox,{label:'Bens nets',value:e(Money,null,fmt(totalBens-totalDeute)),color:C.purple,icon:'🏛️',onClick:esActual?()=>setTab('bens'):null})
    ),

    // Charts
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
      e(Card,null,
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
          e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,textTransform:'uppercase'}},'Evolucio patrimoni'),
          e('span',{style:{color:C.dim,fontSize:9}},'Auto: dia 1 cada mes')
        ),
        evoActual.length<2
          ? e('div',{style:{height:130,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6}},
              e('div',{style:{color:C.dim,fontSize:11}},'Ves afegint fotos cada mes'),
              e('div',{style:{color:C.dim,fontSize:9}},'Clica "Foto" per guardar el mes actual')
            )
          : e(AreaChartSimple,{data:evoActual,height:130})
      ),
      e(Card,null,
        e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,marginBottom:10,textTransform:'uppercase'}},'Distribucio patrimoni'),
        distrib.length===0
          ? e('div',{style:{color:C.dim,fontSize:11,textAlign:'center',padding:16}},'Afegeix dades')
          : e('div',null,
              e('div',{style:{display:'flex',justifyContent:'center',marginBottom:10,position:'relative'}},
                e(DonutChart,{data:distrib,size:120}),
                e('div',{style:{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}},
                  e('div',{style:{color:C.text,fontFamily:'monospace',fontWeight:800,fontSize:11}},e(Money,null,fmt(distribTotal))),
                  e('div',{style:{color:C.dim,fontSize:8}},'total')
                )
              ),
              distrib.map(d=>e('div',{key:d.name,style:{display:'flex',alignItems:'center',gap:6,marginBottom:6}},
                e('div',{style:{width:8,height:8,borderRadius:2,background:d.color,flexShrink:0}}),
                e('span',{style:{color:C.dim,fontSize:10,flex:1}},d.name),
                e('span',{style:{color:C.text,fontSize:10,fontFamily:'monospace'}},e(Money,null,fmt(d.value))),
                e('span',{style:{background:d.color+'22',color:d.color,borderRadius:4,padding:'0 5px',fontSize:9,fontWeight:700,marginLeft:3}},d.pct+'%')
              ))
            )
      )
    ),

    // Objectius
    e(Card,null,
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,textTransform:'uppercase'}},"Objectius d'estalvi"),
        e(Btn,{onClick:()=>{setFObj({nom:'',meta:'',actual:'',icona:'🎯'});setErrObj({});setModalObj('nou');},style:{padding:'4px 10px',fontSize:10}},'+ Nou')
      ),
      data.objectius.length===0 && e('div',{style:{color:C.dim,fontSize:12,textAlign:'center',padding:16}},'Cap objectiu. Afegeix-ne un!'),
      data.objectius.map(o=>{
        const prog=(o.actual/o.meta)*100;
        return e('div',{key:o.id,style:{marginBottom:12}},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
            e('div',{style:{display:'flex',alignItems:'center',gap:6}},
              e('span',{style:{fontSize:14}},o.icona),
              e('span',{style:{color:C.text,fontWeight:600,fontSize:12}},o.nom),
              e('button',{onClick:()=>{setFObj({nom:o.nom,meta:String(o.meta),actual:String(o.actual),icona:o.icona});setErrObj({});setModalObj(o.id);},
                style:{background:'none',border:'none',color:C.dim,cursor:'pointer',fontSize:11,padding:0}},'✏️')
            ),
            e('div',{style:{display:'flex',alignItems:'center',gap:8}},
              e('span',{style:{color:C.accent,fontFamily:'monospace',fontSize:11}},e(Money,null,fmt(o.actual))),
              e('span',{style:{color:C.dim,fontSize:10}},'/ ',e(Money,null,fmt(o.meta))),
              e(DeleteBtn,{nom:o.nom,onDelete:()=>setData(d=>({...d,objectius:d.objectius.filter(x=>x.id!==o.id)}))})
            )
          ),
          e(ProgressBar,{value:o.actual,max:o.meta,color:prog>=100?C.green:C.accent}),
          e('div',{style:{color:C.dim,fontSize:10,marginTop:2}},prog.toFixed(0)+'% · Falta ',e(Money,null,fmt(Math.max(0,o.meta-o.actual))))
        );
      })
    ),
    modalObj && e(Modal,{title:modalObj==='nou'?'Nou objectiu':'Editar objectiu',onClose:()=>setModalObj(null)},
      e('div',{style:{display:'grid',gridTemplateColumns:'55px 1fr',gap:7}},
        e(Input,{label:'Icona',value:fObj.icona,onChange:v=>setFObj(f=>({...f,icona:v}))}),
        e(Input,{label:'Nom',value:fObj.nom,onChange:v=>setFObj(f=>({...f,nom:v})),placeholder:'Ex: Vacances',error:errObj.nom})
      ),
      e(Input,{label:'Meta (€)',type:'number',value:fObj.meta,onChange:v=>setFObj(f=>({...f,meta:v})),placeholder:'5000',error:errObj.meta}),
      e(Input,{label:'Estalviat fins ara (€)',type:'number',value:fObj.actual,onChange:v=>setFObj(f=>({...f,actual:v})),placeholder:'0'}),
      e(RowBtns,{onSave:desarObj,onCancel:()=>setModalObj(null)})
    )
  );
}

// ── GASTOS FIXES ──────────────────────────────────────────────────────────────
function GastosFixes({data,setData}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nom:'',import:'',categoria:'',periodicitat:'mensual'});
  const [errs,setErrs]=useState({});
  const [filtreCat,setFiltreCat]=useState('Tots');

  // Preomple colors de categories existents per consistència
  data.gastosFixes.forEach(g=>{ if(g.categoria) colorPerCat(g.categoria); });

  // Import mensual equivalent (anual / 12)
  const importMensual = g => g.periodicitat==='anual' ? g.import/12 : g.import;
  const total = data.gastosFixes.reduce((s,g)=>s+importMensual(g),0);

  const cats = ['Tots',...new Set(data.gastosFixes.map(g=>g.categoria))];
  const fixesFiltrats = filtreCat==='Tots'
    ? data.gastosFixes
    : data.gastosFixes.filter(g=>g.categoria===filtreCat);

  // Agrupats per categoria per gràfiques
  const catsList = [...new Set(data.gastosFixes.map(g=>g.categoria))];
  const byCat = catsList.map(c=>({
    cat:c,
    total:data.gastosFixes.filter(g=>g.categoria===c).reduce((s,g)=>s+importMensual(g),0),
    color:colorPerCat(c)
  }));

  const obrir=(g)=>{
    if(g==='nou'){setForm({nom:'',import:'',categoria:'',periodicitat:'mensual'});setErrs({});setModal('nou');}
    else{setForm({nom:g.nom,import:String(g.import),categoria:g.categoria,periodicitat:g.periodicitat||'mensual'});setErrs({});setModal(g.id);}
  };

  const desar=()=>{
    const er={};
    if(!form.nom.trim())er.nom='Obligatori';
    if(!form.import||isNaN(form.import)||+form.import<=0)er.import='Import vàlid';
    if(Object.keys(er).length){setErrs(er);return;}
    const cat=form.categoria.trim()||'Altres';
    const color=colorPerCat(cat);
    const item={
      id:modal==='nou'?uid():modal,
      nom:form.nom.trim(),
      import:+form.import,
      categoria:cat,
      periodicitat:form.periodicitat,
      color
    };
    setData(d=>({...d,gastosFixes:modal==='nou'?[...d.gastosFixes,item]:d.gastosFixes.map(g=>g.id===modal?{...g,...item}:g)}));
    setModal(null);
  };

  return e('div',null,
    // Header
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      e('div',null,
        e('div',{style:{color:C.dim,fontSize:10,letterSpacing:1}},'TOTAL MENSUAL EQUIVALENT'),
        e('div',{style:{color:C.red,fontSize:24,fontWeight:800,fontFamily:'monospace'}},e(Money,null,fmt(total)))
      ),
      e(Btn,{onClick:()=>obrir('nou')},'+ Afegir')
    ),

    // Gràfiques
    data.gastosFixes.length>0 && e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
      e(Card,null,
        e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,marginBottom:9,textTransform:'uppercase'}},'Per categoria'),
        e(HBarChart,{data:byCat,height:Math.max(80,byCat.length*30)})
      ),
      e(Card,null,
        e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,marginBottom:9,textTransform:'uppercase'}},'Distribució'),
        e(DonutChart,{data:data.gastosFixes.map(g=>({value:importMensual(g),color:g.color||colorPerCat(g.categoria)})),size:150})
      )
    ),

    // Filtre categories
    cats.length>2 && e('div',{style:{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap'}},
      cats.map(c=>e('button',{key:c,onClick:()=>setFiltreCat(c),style:{
        background:filtreCat===c?colorPerCat(c==='Tots'?'':c)+'33':'transparent',
        color:filtreCat===c?(c==='Tots'?C.accent:colorPerCat(c)):C.dim,
        border:'1px solid '+(filtreCat===c?(c==='Tots'?C.accent:colorPerCat(c))+'66':C.border),
        borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:10,fontFamily:'inherit',fontWeight:600
      }},c==='Tots'?'Tots':e('span',null,
        e('span',{style:{width:6,height:6,borderRadius:'50%',background:colorPerCat(c),display:'inline-block',marginRight:5,verticalAlign:'middle'}}),
        c
      )))
    ),

    // Agrupat per categoria
    e('div',{style:{display:'grid',gap:16}},
      data.gastosFixes.length===0
        ? e('div',{style:{color:C.dim,fontSize:12,textAlign:'center',padding:24}},'Cap gasto fix. Afegeix-ne un!')
        : catsList
            .filter(c=>filtreCat==='Tots'||c===filtreCat)
            .map(cat=>{
              const gastosDelCat = data.gastosFixes.filter(g=>g.categoria===cat);
              const totalCat = gastosDelCat.reduce((s,g)=>s+importMensual(g),0);
              const col = colorPerCat(cat);
              return e('div',{key:cat},
                // Capçalera categoria
                e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:6}},
                  e('div',{style:{width:10,height:10,borderRadius:'50%',background:col}}),
                  e('span',{style:{color:C.text,fontWeight:700,fontSize:12}},cat),
                  e('span',{style:{color:C.dim,fontSize:11,marginLeft:'auto'}},e(Money,null,fmt(totalCat)),'/mes')
                ),
                // Gastos de la categoria
                e('div',{style:{display:'grid',gap:5,paddingLeft:18}},
                  gastosDelCat.map(g=>{
                    const mensual = importMensual(g);

// ── INVERSIONS ────────────────────────────────────────────────────────────────
const GECKO_MAP={
  'BTC':'bitcoin','BTC-EUR':'bitcoin','ETH':'ethereum','ETH-EUR':'ethereum',
  'SOL':'solana','SOL-EUR':'solana','BNB':'binancecoin','BNB-EUR':'binancecoin',
  'XRP':'ripple','XRP-EUR':'ripple','ADA':'cardano','ADA-EUR':'cardano',
  'MATIC':'matic-network','AVAX':'avalanche-2','LINK':'chainlink'
};

async function fetchPrice(ticker,tipus) {
  if(!ticker)return null;
  const t=ticker.toUpperCase();
  const geckoId=GECKO_MAP[t];
  if(geckoId||tipus==='Cripto'){
    const id=geckoId||t.replace('-EUR','').replace('-USD','').toLowerCase();
    try{const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=eur`);if(r.ok){const d=await r.json();if(d[id]?.eur)return d[id].eur;}}catch{}
  }
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`;
    const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    if(r.ok){const o=await r.json();const d=JSON.parse(o.contents);const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;if(p)return Math.round(p*100)/100;}
  }catch{}
  return null;
}

function InvCard({inv,onEdit,onValorChange,onDelete}) {
  const [fetching,setFetching]=useState(false);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [editing,setEditing]=useState(false);
  const [tempVal,setTempVal]=useState('');
  const g=inv.valor-inv.cost;
  const p=gainPct(inv.valor,inv.cost);

  const refresh=async(ev)=>{ev.stopPropagation();setFetching(true);const pr=await fetchPrice(inv.ticker,inv.tipus);if(pr!==null){onValorChange(pr);setLastUpdate(new Date().toLocaleTimeString('ca-ES',{hour:'2-digit',minute:'2-digit'}));}setFetching(false);};

  return e(Card,{style:{padding:'10px 12px'},onClick:!editing?onEdit:undefined},
    e('div',{style:{display:'flex',alignItems:'center',gap:9}},
      e('div',{style:{width:3,height:32,borderRadius:2,background:inv.color,flexShrink:0}}),
      e('div',{style:{flex:1}},
        e('div',{style:{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}},
          e('span',{style:{fontWeight:600,color:C.text,fontSize:12}},inv.nom),
          e(Badge,{color:inv.color},inv.tipus),
          inv.ticker && e('span',{style:{color:C.dim,fontSize:9,fontFamily:'monospace'}},inv.ticker)
        ),
        lastUpdate && e('div',{style:{color:C.green,fontSize:9,marginTop:2}},`✓ actualitzat ${lastUpdate}`)
      ),
      e('div',{style:{textAlign:'right'}},
        editing
          ? e('span',{style:{display:'inline-flex',alignItems:'center',gap:4}},
              e('input',{value:tempVal,onChange:ev=>setTempVal(ev.target.value),type:'number',autoFocus:true,
                onKeyDown:ev=>{if(ev.key==='Enter'){const v=parseFloat(tempVal);if(!isNaN(v)&&v>=0)onValorChange(v);setEditing(false);}if(ev.key==='Escape')setEditing(false);},
                onClick:ev=>ev.stopPropagation(),
                style:{background:C.bg,border:`1px solid ${C.accent}`,borderRadius:6,color:C.text,padding:'4px 8px',fontSize:13,width:100,outline:'none',fontFamily:'monospace',fontWeight:700,textAlign:'right'}}),
              e('button',{onClick:ev=>{ev.stopPropagation();const v=parseFloat(tempVal);if(!isNaN(v)&&v>=0)onValorChange(v);setEditing(false);},
                style:{background:C.accent,border:'none',color:C.bg,borderRadius:5,padding:'4px 8px',cursor:'pointer',fontSize:11,fontWeight:800}},'✓'),
              e('button',{onClick:ev=>{ev.stopPropagation();setEditing(false);},style:{background:'none',border:'none',color:C.dim,cursor:'pointer',fontSize:13}},'✕')
            )
          : e('div',{onClick:ev=>{ev.stopPropagation();setTempVal(String(inv.valor));setEditing(true);},title:'Clic per editar',style:{cursor:'pointer'}},
              e('div',{style:{color:fetching?C.dim:C.text,fontFamily:'monospace',fontWeight:700,fontSize:13,borderBottom:`1px dashed ${C.border}`}},
                fetching ? e('span',{style:{color:C.accent}},'···') : e(Money,null,fmt(inv.valor))
              ),
              e('div',{style:{color:g>=0?C.green:C.red,fontSize:10,fontFamily:'monospace'}},
                e(Money,null,`${g>=0?'+':''}${fmt(g)} (${p>=0?'+':''}${p.toFixed(1)}%)`)
              )
            )
      ),
      inv.ticker && !editing && e('button',{
        onClick:refresh, disabled:fetching, title:`Actualitzar preu de ${inv.ticker}`,
        onMouseEnter:ev=>{if(!fetching){ev.currentTarget.style.borderColor=C.accent+'66';ev.currentTarget.style.color=C.accent;}},
        onMouseLeave:ev=>{if(!fetching){ev.currentTarget.style.borderColor=C.border;ev.currentTarget.style.color=C.dim;}},
        style:{background:'transparent',border:`1px solid ${C.border}`,color:C.dim,borderRadius:6,width:26,height:26,cursor:fetching?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,transition:'all .2s',fontWeight:700}
      },fetching?'⏳':'↻'),
      e(DeleteBtn,{nom:inv.nom,onDelete})
    )
  );
}

function Inversions({data,setData}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nom:'',ticker:'',tipus:'ETF',valor:'',cost:''});
  const [errs,setErrs]=useState({});
  const [refreshingAll,setRefreshingAll]=useState(false);
  const [refreshLog,setRefreshLog]=useState('');
  const [filtreInv,setFiltreInv]=useState('Tots');
  const [sortDesc,setSortDesc]=useState(true);
  const [aportModal,setAportModal]=useState(false);
  const [aportForm,setAportForm]=useState({invId:'',import:''});
  const [aportErr,setAportErr]=useState({});

  const total=data.inversions.reduce((s,i)=>s+i.valor,0);
  const totalCost=data.inversions.reduce((s,i)=>s+i.cost,0);
  const guany=total-totalCost;
  const pctG=gainPct(total,totalCost);
  const byTipus=['ETF','Fons','Accions','Cripto','Pensions','Bons','Altres'].map(t=>({
    name:t,value:data.inversions.filter(i=>i.tipus===t).reduce((s,i)=>s+i.valor,0),
    color:TIPUS_COLORS[t]||C.dim
  })).filter(d=>d.value>0);

  const obrir=(inv)=>{
    if(inv==='nou'){setForm({nom:'',ticker:'',tipus:'ETF',valor:'',cost:''});setErrs({});setModal('nou');}
    else{setForm({nom:inv.nom,ticker:inv.ticker||'',tipus:inv.tipus,valor:String(inv.valor),cost:String(inv.cost)});setErrs({});setModal(inv.id);}
  };
  const desar=()=>{
    const er={};if(!form.nom.trim())er.nom='Obligatori';if(!form.valor||isNaN(form.valor)||+form.valor<0)er.valor='Import vàlid';if(!form.cost||isNaN(form.cost)||+form.cost<0)er.cost='Import vàlid';
    if(Object.keys(er).length){setErrs(er);return;}
    const item={id:modal==='nou'?uid():modal,nom:form.nom.trim(),ticker:form.ticker.trim()||null,tipus:form.tipus,valor:+form.valor,cost:+form.cost,color:TIPUS_COLORS[form.tipus]||PAL[data.inversions.length%PAL.length]};
    setData(d=>({...d,inversions:modal==='nou'?[...d.inversions,item]:d.inversions.map(i=>i.id===modal?{...i,...item}:i)}));
    setModal(null);
  };

  const refreshAll=async()=>{
    const amb=data.inversions.filter(i=>i.ticker);
    if(!amb.length){setRefreshLog('Cap actiu té ticker assignat.');return;}
    setRefreshingAll(true);setRefreshLog(`Actualitzant ${amb.length} actius...`);
    const updates={};let ok=0,fail=0;
    await Promise.all(amb.map(async inv=>{const pr=await fetchPrice(inv.ticker,inv.tipus);if(pr!==null){updates[inv.id]=pr;ok++;}else fail++;}));
    if(ok>0)setData(d=>({...d,inversions:d.inversions.map(i=>updates[i.id]!==undefined?{...i,valor:updates[i.id]}:i)}));
    setRefreshLog(`✓ ${ok} actualitzat${ok!==1?'s':''}${fail>0?` · ${fail} error`:''}·${new Date().toLocaleTimeString('ca-ES',{hour:'2-digit',minute:'2-digit'})}`);
    setRefreshingAll(false);
  };

  return e('div',null,
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
      e('div',null,
        e('div',{style:{color:C.dim,fontSize:10,letterSpacing:1}},'CARTERA TOTAL'),
        e('div',{style:{color:C.accent,fontSize:24,fontWeight:800,fontFamily:'monospace'}},e(Money,null,fmt(total))),
        e('div',{style:{color:guany>=0?C.green:C.red,fontSize:11}},guany>=0?'▲':'▼',' ',e(Money,null,fmt(Math.abs(guany))),` (${Math.abs(pctG).toFixed(1)}%)`)
      ),
      e('div',{style:{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end'}},
        e(Btn,{onClick:()=>{setAportForm({invId:'',import:''});setAportErr({});setAportModal(true);}},
          '+ Aportació'),
        e(Btn,{onClick:()=>obrir('nou'),secondary:true},'+ Nou actiu'),
        e(Btn,{onClick:refreshAll,disabled:refreshingAll,secondary:true,style:{fontSize:10,padding:'5px 10px'}},refreshingAll?'⏳ Actualitzant...':'↻ Actualitzar tots'),
        refreshLog && e('div',{style:{color:refreshLog.startsWith('✓')?C.green:C.dim,fontSize:9,textAlign:'right',maxWidth:150}},refreshLog)
      )
    ),
    data.inversions.length>0 && e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
      e(Card,null,
        e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,marginBottom:9,textTransform:'uppercase'}},'Per tipus'),
        e('div',{style:{display:'flex',alignItems:'center',gap:8}},
          e(DonutChart,{data:byTipus,size:90}),
          e('div',{style:{flex:1}},
            byTipus.map(d=>e('div',{key:d.name,style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
              e('div',{style:{display:'flex',alignItems:'center',gap:4}},
                e('div',{style:{width:5,height:5,borderRadius:'50%',background:d.color}}),
                e('span',{style:{color:C.dim,fontSize:9}},d.name)
              ),
              e('span',{style:{color:C.text,fontSize:9,fontFamily:'monospace'}},`${((d.value/total)*100).toFixed(0)}%`)
            ))
          )
        )
      ),
      e(Card,null,
        e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,marginBottom:9,textTransform:'uppercase'}},'P&L Global'),
        [['Invertit',fmt(totalCost),C.dim],['Valor actual',fmt(total),C.accent],[`${guany>=0?'+':''}${fmt(guany)}`,`Guany/Pèrdua`,guany>=0?C.green:C.red]].map(([v,k,c])=>
          e('div',{key:k,style:{display:'flex',justifyContent:'space-between',marginBottom:6,paddingTop:k==='Guany/Pèrdua'?6:0,borderTop:k==='Guany/Pèrdua'?`1px solid ${C.border}`:'none'}},
            e('span',{style:{color:C.dim,fontSize:11}},k),
            e('span',{style:{color:c,fontFamily:'monospace',fontWeight:700,fontSize:11}},e(Money,null,v))
          )
        )
      )
    ),
    // Filtre + ordenació
    e('div',{style:{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap',alignItems:'center'}},
      ['Tots','ETF','Fons','Accions','Cripto','Pensions','Bons','Altres'].map(t=>
        e('button',{key:t,onClick:()=>setFiltreInv(t),style:{
          background:filtreInv===t?(TIPUS_COLORS[t]||C.accent)+'33':'transparent',
          color:filtreInv===t?(TIPUS_COLORS[t]||C.accent):C.dim,
          border:'1px solid '+(filtreInv===t?(TIPUS_COLORS[t]||C.accent)+'66':C.border),
          borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:10,fontFamily:'inherit',fontWeight:600
        }},t)
      ),
      e('button',{onClick:()=>setSortDesc(s=>!s),style:{
        marginLeft:'auto',background:'transparent',border:'1px solid '+C.border,
        color:C.dim,borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:10,fontFamily:'inherit'
      }},sortDesc?'↓ Major valor':'↑ Menor valor')
    ),
    e('div',{style:{display:'grid',gap:7}},
      data.inversions.length===0 && e('div',{style:{color:C.dim,fontSize:12,textAlign:'center',padding:24}},'Cap inversió. Afegeix-ne una!'),
      [...data.inversions]
        .filter(inv=>filtreInv==='Tots'||inv.tipus===filtreInv)
        .sort((a,b)=>sortDesc?b.valor-a.valor:a.valor-b.valor)
        .map(inv=>e(InvCard,{key:inv.id,inv,onEdit:()=>obrir(inv),
        onValorChange:v=>setData(d=>({...d,inversions:d.inversions.map(i=>i.id===inv.id?{...i,valor:v}:i)})),
        onDelete:()=>setData(d=>({...d,inversions:d.inversions.filter(x=>x.id!==inv.id)}))
      }))
    ),
    aportModal && e(Modal,{title:'+ Aportació a inversió',onClose:()=>setAportModal(false)},
      // Descripció del concepte
      e('div',{style:{background:C.accentDim,border:'1px solid '+C.accent+'33',borderRadius:10,padding:'10px 14px',marginBottom:14}},
        e('div',{style:{color:C.accent,fontSize:11,fontWeight:700,marginBottom:3}},'Com funciona'),
        e('div',{style:{color:C.dim,fontSize:11,lineHeight:1.6}},
          "Afegeix diners a una posicio existent. El valor i el cost s'actualitzen automaticament.",e('br'),
          "Si supera el teu gasto fix mensual d'inversions, el diferencial es registra com a variable extra."
        )
      ),
      // Seleccionar actiu
      e('div',{style:{marginBottom:14}},
        e('div',{style:{color:C.dim,fontSize:10,fontWeight:600,marginBottom:8,textTransform:'uppercase'}},'On vas a aportar?'),
        e('div',{style:{display:'grid',gap:6}},
          data.inversions.map(inv=>e('div',{key:inv.id,
            onClick:()=>setAportForm(f=>({...f,invId:String(inv.id)})),
            style:{
              background:aportForm.invId===String(inv.id)?inv.color+'22':C.surface,
              border:'2px solid '+(aportForm.invId===String(inv.id)?inv.color:C.border),
              borderRadius:10,padding:'10px 14px',cursor:'pointer',transition:'all .15s',
              display:'flex',justifyContent:'space-between',alignItems:'center'
            }},
            e('div',{style:{display:'flex',alignItems:'center',gap:8}},
              e('div',{style:{width:10,height:10,borderRadius:'50%',background:inv.color}}),
              e('div',null,
                e('div',{style:{color:C.text,fontWeight:700,fontSize:13}},inv.nom),
                e('div',{style:{color:C.dim,fontSize:10}},inv.tipus+(inv.ticker?' · '+inv.ticker:''))
              )
            ),
            e('div',{style:{textAlign:'right'}},
              e('div',{style:{color:C.text,fontFamily:'monospace',fontWeight:700,fontSize:12}},e(Money,null,fmt(inv.valor))),
              e('div',{style:{color:inv.valor>=inv.cost?C.green:C.red,fontSize:10}},
                (inv.valor>=inv.cost?'+':'')+((inv.valor-inv.cost)/inv.cost*100).toFixed(1)+'%'
              )
            )
          ))
        ),
        aportErr.invId && e('div',{style:{color:C.red,fontSize:10,marginTop:4}},aportErr.invId)
      ),
      // Import
      e('div',{style:{marginBottom:14}},
        e('div',{style:{color:C.dim,fontSize:10,fontWeight:600,marginBottom:6,textTransform:'uppercase'}},'Import a aportar (€)'),
        e('input',{
          type:'number',value:aportForm.import,
          onChange:ev=>setAportForm(f=>({...f,import:ev.target.value})),
          placeholder:'0.00',
          style:{width:'100%',background:C.bg,border:'1px solid '+(aportErr.import?C.red:C.border),
            borderRadius:8,color:C.text,padding:'10px 12px',fontSize:15,outline:'none',
            fontFamily:'monospace',fontWeight:700,boxSizing:'border-box'}
        }),
        aportErr.import && e('div',{style:{color:C.red,fontSize:10,marginTop:3}},aportErr.import),
        // Info: fix mensual d'inversions
        (()=>{
          const fixInv = data.gastosFixes.filter(g=>
            g.nom.toLowerCase().includes('invers') ||
            g.categoria.toLowerCase().includes('invers')
          ).reduce((s,g)=>{
            const im = g.periodicitat==='anual'?g.import/12:g.import;
            return s+im;
          },0);
          const v = parseFloat(aportForm.import)||0;
          if(fixInv>0) return e('div',{style:{marginTop:6,color:C.dim,fontSize:10,lineHeight:1.5}},
            'Gasto fix inversions: ',e('span',{style:{color:C.accent}},e(Money,null,fmt(fixInv)),'/mes'),e('br'),
            v>fixInv
              ? e('span',{style:{color:C.yellow}},'⚠ Extra de ',e(Money,null,fmt(v-fixInv)),' es registrara com a variable')
              : e('span',{style:{color:C.green}},'✓ Dins del fix mensual')
          );
          return null;
        })()
      ),
      // Botó confirmar
      e(RowBtns,{
        onSave:()=>{
          const er={};
          if(!aportForm.invId)er.invId='Selecciona un actiu';
          if(!aportForm.import||isNaN(aportForm.import)||+aportForm.import<=0)er.import='Import vàlid';
          if(Object.keys(er).length){setAportErr(er);return;}
          const v=Math.round(+aportForm.import*100)/100;
          const invId=aportForm.invId;
          // Fix mensual inversions
          const fixInv=data.gastosFixes.filter(g=>
            g.nom.toLowerCase().includes('invers')||g.categoria.toLowerCase().includes('invers')
          ).reduce((s,g)=>s+(g.periodicitat==='anual'?g.import/12:g.import),0);
          const extra=fixInv>0?Math.max(0,v-fixInv):0;
          setData(d=>{
            const nd={...d,
              inversions:d.inversions.map(i=>String(i.id)===invId
                ?{...i,valor:Math.round((i.valor+v)*100)/100,cost:Math.round((i.cost+v)*100)/100}
                :i
              )
            };
            // Si hi ha extra, registrar com a variable
            if(extra>0){
              const mk=mesKey();
              const prev=(nd.historialVariables?.[mk]?.['Inversions extra'])||0;
              nd.historialVariables={...(nd.historialVariables||{}),[mk]:{
                ...(nd.historialVariables?.[mk]||{}),
                'Inversions extra':Math.round((prev+extra)*100)/100
              }};
            }
            return nd;
          });
          setAportModal(false);
          setAportForm({invId:'',import:''});
        },
        onCancel:()=>setAportModal(false)
      })
    ),
    modal && e(Modal,{title:modal==='nou'?'Nova inversió':'Editar inversió',onClose:()=>setModal(null)},
      e(Input,{label:'Nom',value:form.nom,onChange:v=>setForm(f=>({...f,nom:v})),placeholder:'Ex: MSCI World ETF',error:errs.nom}),
      e(Input,{label:'Ticker (per actualitzar preus)',value:form.ticker,onChange:v=>setForm(f=>({...f,ticker:v})),placeholder:'Ex: IWDA, AAPL, BTC-EUR'}),
      e(Select,{label:'Tipus',value:form.tipus,onChange:v=>setForm(f=>({...f,tipus:v})),options:['ETF','Fons','Accions','Cripto','Pensions','Bons','Altres']}),
      e(Input,{label:'Valor actual (€)',type:'number',value:form.valor,onChange:v=>setForm(f=>({...f,valor:v})),error:errs.valor}),
      e(Input,{label:"Cost d'adquisició (€)",type:'number',value:form.cost,onChange:v=>setForm(f=>({...f,cost:v})),error:errs.cost}),
      e(RowBtns,{onSave:desar,onCancel:()=>setModal(null)})
    )
  );
}

// ── BÉNS ──────────────────────────────────────────────────────────────────────
// Config per tipus: [icona, mostra_compra, mostra_deute, label_deute, label_fi, badge_color]
const BENS_CFG = {
  'Immoble':    ['🏠', true,  true,  'Hipoteca pendent', 'Fi hipoteca',  C.purple],
  'Vehicle':    ['🚗', true,  true,  'Prestec pendent',  'Fi prestec',   C.orange],
  'Prestec':    ['📄', false, true,  'Capital pendent',  'Fi prestec',   C.red],
  'Compte':     ['💰', false, false, '',                 '',             C.green],
  'Col·leccio': ['🎨', true,  false, '',                 '',             C.yellow],
  'Electronica':['💻', true,  false, '',                 '',             C.accent],
  'Altres':     ['📦', true,  false, '',                 '',             C.dim],
};

function Bens({data,setData}) {
  const [modal,setModal]=useState(null);
  const emptyBe={nom:'',tipus:'Immoble',valorActual:'',valorCompra:'',deute:'',mensualitat:'',anysFi:'',icona:'🏠'};
  const [form,setForm]=useState(emptyBe);
  const [errs,setErrs]=useState({});

  const totalActius = data.bens.reduce((s,b)=>s+b.valorActual,0);
  const totalDeute  = data.bens.reduce((s,b)=>s+(b.deute||0),0);
  const totalNet    = totalActius - totalDeute;

  const obrir=(b)=>{
    if(b==='nou'){
      setForm(emptyBe);setErrs({});setModal('nou');
    } else {
      setForm({nom:b.nom,tipus:b.tipus,valorActual:String(b.valorActual),
        valorCompra:String(b.valorCompra||''),deute:String(b.deute||0),
        mensualitat:String(b.mensualitat||0),anysFi:b.anysFi||'',icona:b.icona||'📦'});
      setErrs({});setModal(b.id);
    }
  };

  const desar=()=>{
    const er={};
    if(!form.nom.trim())er.nom='Obligatori';
    if(!form.valorActual||isNaN(form.valorActual)||+form.valorActual<0)er.valorActual='Import vàlid';
    if(Object.keys(er).length){setErrs(er);return;}
    const cfg = BENS_CFG[form.tipus]||BENS_CFG['Altres'];
    const item={
      id:modal==='nou'?uid():modal,
      nom:form.nom.trim(),
      tipus:form.tipus,
      valorActual:+form.valorActual,
      valorCompra:cfg[1]?(+form.valorCompra||+form.valorActual):0,
      deute:cfg[2]?(+form.deute||0):0,
      mensualitat:cfg[2]?(+form.mensualitat||0):0,
      anysFi:cfg[2]?form.anysFi.trim():'',
      icona:form.icona||cfg[0]
    };
    setData(d=>({...d,bens:modal==='nou'?[...d.bens,item]:d.bens.map(b=>b.id===modal?item:b)}));
    setModal(null);
  };

  // Quan canvia el tipus, actualitza la icona per defecte si era la icona per defecte
  const onTipusChange = (t) => {
    const oldCfg = BENS_CFG[form.tipus]||BENS_CFG['Altres'];
    const newCfg = BENS_CFG[t]||BENS_CFG['Altres'];
    const icona = form.icona===oldCfg[0] ? newCfg[0] : form.icona;
    setForm(f=>({...f,tipus:t,icona}));
  };

  return e('div',null,
    // Header resum
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      e('div',null,
        e('div',{style:{color:C.dim,fontSize:10,letterSpacing:1}},'PATRIMONI NET'),
        e('div',{style:{color:C.purple,fontSize:24,fontWeight:800,fontFamily:'monospace'}},e(Money,null,fmt(totalNet))),
        e('div',{style:{display:'flex',gap:12,marginTop:2}},
          e('span',{style:{color:C.dim,fontSize:10}},'Actius: ',e('span',{style:{color:C.text,fontWeight:700}},e(Money,null,fmt(totalActius)))),
          totalDeute>0 && e('span',{style:{color:C.dim,fontSize:10}},'Deutes: ',e('span',{style:{color:C.red,fontWeight:700}},e(Money,null,fmt(totalDeute))))
        )
      ),
      e(Btn,{onClick:()=>obrir('nou')},'+ Afegir')
    ),

    // Llista de béns
    e('div',{style:{display:'grid',gap:10}},
      data.bens.length===0 && e('div',{style:{color:C.dim,fontSize:12,textAlign:'center',padding:24}},'Cap bé registrat. Afegeix-ne un!'),
      data.bens.map(b=>{
        const cfg = BENS_CFG[b.tipus]||BENS_CFG['Altres'];
        const [icoDef, mostraCompra, mostraDeute, labelDeute, labelFi, badgeColor] = cfg;
        const eq = b.valorActual-(b.deute||0);
        const g  = mostraCompra ? b.valorActual-(b.valorCompra||b.valorActual) : 0;
        const pg = mostraCompra ? gainPct(b.valorActual, b.valorCompra||b.valorActual) : 0;

        return e(Card,{key:b.id,onClick:()=>obrir(b)},
          // Capçalera
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:(b.deute>0&&mostraDeute)?10:0}},
            e('div',{style:{display:'flex',alignItems:'center',gap:9}},

function Transaccions({data,setData}) {
  const [modal,setModal]=useState(null);
  const [filtre,setFiltre]=useState('tot');
  const [cerca,setCerca]=useState('');
  const empty={data:new Date().toISOString().slice(0,10),descripcio:'',import:'',categoria:'',tipus:'gasto',actiu_id:''};
  const [form,setForm]=useState(empty);
  const [errs,setErrs]=useState({});

  const detectar=(desc)=>{
    const d=desc.toLowerCase();
    const inv=data.inversions.find(i=>d.includes(i.nom.toLowerCase())||(i.ticker&&d.includes(i.ticker.toLowerCase())));
    if(inv)return{tipus:'inversio',categoria:inv.nom,actiu_id:inv.id};
    const fix=data.gastosFixes.find(g=>d.includes(g.nom.toLowerCase())||d.includes(g.categoria.toLowerCase()));
    if(fix)return{tipus:'gasto',categoria:fix.categoria,actiu_id:''};
    const cats=Object.keys(data.pressupostosVariables||{});
    const cat=cats.find(c=>d.includes(c.toLowerCase()));
    if(cat)return{tipus:'gasto',categoria:cat,actiu_id:''};
    return null;
  };

  const obrir=(t)=>{
    if(t==='nou'){setForm(empty);setErrs({});setModal('nou');}
    else{setForm({data:t.data,descripcio:t.descripcio,import:String(Math.abs(t.import)),categoria:t.categoria,tipus:t.tipus,actiu_id:t.actiu_id||''});setErrs({});setModal(t.id);}
  };
  const desar=()=>{
    const er={};if(!form.descripcio.trim())er.descripcio='Obligatori';if(!form.import||isNaN(form.import)||+form.import<=0)er.import='Import vàlid';
    if(Object.keys(er).length){setErrs(er);return;}
    const signe=form.tipus==='gasto'?-1:1;
    const item={id:modal==='nou'?uid():modal,data:form.data,descripcio:form.descripcio.trim(),import:signe*Math.abs(+form.import),categoria:form.categoria.trim()||'Altres',tipus:form.tipus,actiu_id:form.actiu_id};
    setData(d=>{
      let nd={...d,transaccions:modal==='nou'?[item,...d.transaccions]:d.transaccions.map(t=>t.id===modal?item:t)};
      if(form.tipus==='inversio'&&form.actiu_id){
        const inv=d.inversions.find(i=>String(i.id)===String(form.actiu_id));
        if(inv){const inc=Math.abs(+form.import);nd.inversions=nd.inversions.map(i=>i.id===inv.id?{...i,valor:Math.round((i.valor+inc)*100)/100,cost:Math.round((i.cost+inc)*100)/100}:i);}
      }
      if(form.tipus==='gasto'&&form.categoria){
        const mk=mesKey(new Date(form.data+'T12:00:00'));
        const prev=(nd.historialVariables?.[mk]?.[form.categoria])||0;
        nd.historialVariables={...(nd.historialVariables||{}),[mk]:{...(nd.historialVariables?.[mk]||{}),[form.categoria]:Math.round((prev+Math.abs(+form.import))*100)/100}};
      }
      if(form.tipus==='ingres'&&(form.categoria.toLowerCase().includes('nòmina')||form.categoria.toLowerCase().includes('nomina')))nd.ingressos=Math.abs(+form.import);
      return nd;
    });
    setModal(null);
  };

  const tColor={ingres:C.green,gasto:C.red,inversio:C.accent,transferencia:C.yellow};
  const filtrades=data.transaccions
    .filter(t=>filtre==='tot'||t.tipus===filtre)
    .filter(t=>!cerca||t.descripcio.toLowerCase().includes(cerca.toLowerCase())||t.categoria.toLowerCase().includes(cerca.toLowerCase()))
    .sort((a,b)=>new Date(b.data)-new Date(a.data));
  const totalI=data.transaccions.filter(t=>t.import>0).reduce((s,t)=>s+t.import,0);
  const totalG=data.transaccions.filter(t=>t.import<0).reduce((s,t)=>s+t.import,0);
  const catsOpts=[...new Set([...Object.keys(data.pressupostosVariables||{}),...data.gastosFixes.map(g=>g.categoria),'Ingressos','Nòmina','Inversions','Transferència','Altres'])].sort();

  return e('div',null,
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      e('div',null,
        e('div',{style:{color:C.dim,fontSize:10,letterSpacing:1,textTransform:'uppercase'}},'Balanç historial'),
        e('div',{style:{fontSize:22,fontWeight:800,fontFamily:'monospace',color:(totalI+totalG)>=0?C.green:C.red}},e(Money,null,fmt(totalI+totalG)))
      ),
      e(Btn,{onClick:()=>obrir('nou')},'+ Nova transacció')
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:12}},
      e(Card,{style:{padding:'10px 12px'}},e('div',{style:{color:C.dim,fontSize:9,textTransform:'uppercase'}},'Total ingressos'),e('div',{style:{color:C.green,fontFamily:'monospace',fontWeight:700,fontSize:14}},e(Money,null,`+${fmt(totalI)}`))),
      e(Card,{style:{padding:'10px 12px'}},e('div',{style:{color:C.dim,fontSize:9,textTransform:'uppercase'}},'Total gastos'),e('div',{style:{color:C.red,fontFamily:'monospace',fontWeight:700,fontSize:14}},e(Money,null,fmt(totalG))))
    ),
    e('input',{value:cerca,onChange:ev=>setCerca(ev.target.value),placeholder:'🔍 Cercar transaccions...',
      style:{width:'100%',background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:'8px 11px',fontSize:12,outline:'none',marginBottom:9,fontFamily:'inherit'}}),
    e('div',{style:{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap'}},
      [['tot','Tots'],['ingres','Ingressos'],['gasto','Gastos'],['inversio','Inversions'],['transferencia','Transferències']].map(([v,l])=>
        e('button',{key:v,onClick:()=>setFiltre(v),style:{background:filtre===v?C.accentDim:'transparent',color:filtre===v?C.accent:C.dim,border:filtre===v?`1px solid ${C.accent}44`:`1px solid ${C.border}`,borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:10,fontFamily:'inherit',fontWeight:600}},l)
      )
    ),
    e('div',{style:{display:'grid',gap:6}},
      filtrades.length===0 && e('div',{style:{color:C.dim,textAlign:'center',padding:24,fontSize:12}},`Cap transacció${cerca?` per "${cerca}"`:''}` ),
      filtrades.map(t=>{
        const inv=t.actiu_id?data.inversions.find(i=>String(i.id)===String(t.actiu_id)):null;
        return e(Card,{key:t.id,style:{padding:'9px 12px'},onClick:()=>obrir(t)},
          e('div',{style:{display:'flex',alignItems:'center',gap:9}},
            e('div',{style:{width:3,height:28,borderRadius:2,background:tColor[t.tipus]||C.dim,flexShrink:0}}),
            e('div',{style:{flex:1}},
              e('div',{style:{fontWeight:600,color:C.text,fontSize:12}},t.descripcio),
              e('div',{style:{display:'flex',gap:5,marginTop:2,flexWrap:'wrap'}},
                e('span',{style:{color:C.dim,fontSize:9}},t.data),
                e(Badge,{color:tColor[t.tipus]||C.dim},t.categoria),
                inv && e(Badge,{color:inv.color},`→ ${inv.nom}`)
              )
            ),
            e('div',{style:{color:t.import>=0?C.green:C.red,fontFamily:'monospace',fontWeight:700,fontSize:13}},e(Money,null,`${t.import>=0?'+':''}${fmt(t.import)}`)),
            e(DeleteBtn,{nom:t.descripcio,onDelete:()=>setData(d=>({...d,transaccions:d.transaccions.filter(x=>x.id!==t.id)}))})
          )
        );
      })
    ),
    modal && e(Modal,{title:modal==='nou'?'Nova transacció':'Editar transacció',onClose:()=>setModal(null)},
      e(Select,{label:'Tipus',value:form.tipus,onChange:v=>setForm(f=>({...f,tipus:v,actiu_id:''})),options:[{v:'gasto',l:'💸 Gasto'},{v:'ingres',l:'💰 Ingrés'},{v:'inversio',l:'📈 Inversió'},{v:'transferencia',l:'↔️ Transferència'}]}),
      e(Input,{label:'Data',type:'date',value:form.data,onChange:v=>setForm(f=>({...f,data:v}))}),
      e(Input,{label:'Descripció',value:form.descripcio,onChange:v=>{const det=v.length>3?detectar(v):null;setForm(f=>({...f,descripcio:v,...(det||{})}));},placeholder:'Ex: Compra BTC, Nòmina...',error:errs.descripcio}),
      e(Input,{label:'Import (€)',type:'number',value:form.import,onChange:v=>setForm(f=>({...f,import:v})),placeholder:'Sempre positiu',error:errs.import}),
      form.tipus==='inversio'
        ? e('div',{style:{marginBottom:11}},
            e('div',{style:{color:C.dim,fontSize:10,fontWeight:600,marginBottom:3,textTransform:'uppercase'}},'Actiu'),
            e('select',{value:form.actiu_id,onChange:ev=>{const inv=data.inversions.find(i=>String(i.id)===ev.target.value);setForm(f=>({...f,actiu_id:ev.target.value,categoria:inv?.nom||''}));},
              style:{width:'100%',background:C.bg,border:`1px solid ${form.actiu_id?C.accent+'66':C.border}`,borderRadius:8,color:form.actiu_id?C.text:C.dim,padding:'8px 11px',fontSize:13,outline:'none',fontFamily:'inherit'}},
              e('option',{value:''},'— Selecciona un actiu —'),
              data.inversions.map(i=>e('option',{key:i.id,value:String(i.id)},`${i.nom}${i.ticker?` (${i.ticker})`:''}`))
            ),
            form.actiu_id && e('div',{style:{color:C.accent,fontSize:10,marginTop:4}},`✓ S'afegirà al valor de ${form.categoria}`)
          )
        : e('div',{style:{marginBottom:11}},
            e('div',{style:{color:C.dim,fontSize:10,fontWeight:600,marginBottom:3,textTransform:'uppercase'}},'Categoria'),
            e('select',{value:form.categoria,onChange:ev=>setForm(f=>({...f,categoria:ev.target.value})),
              style:{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:'8px 11px',fontSize:13,outline:'none',fontFamily:'inherit'}},
              e('option',{value:''},'— Selecciona —'),
              catsOpts.map(c=>e('option',{key:c,value:c},c))
            ),
            form.tipus==='gasto'&&form.categoria&&(data.pressupostosVariables||{})[form.categoria]!==undefined &&
              e('div',{style:{color:C.green,fontSize:10,marginTop:4}},`✓ S'afegirà als variables de ${mesLabel(mesKey(new Date(form.data+'T12:00:00')))}`)

    )
  );
}

// ── FireInput: uncontrolled input for FIRE params ────────────────────────────
function FireInput({label,unit,value,onSave}) {
  const [localVal,setLocalVal] = useState(String(value));
  const [focused,setFocused] = useState(false);

  // Keep in sync when value changes externally (but not while typing)
  useEffect(()=>{
    if(!focused) setLocalVal(String(value));
  },[value,focused]);

  const commit = (raw) => {
    const v = parseFloat(raw.replace(',','.'));
    if(!isNaN(v) && v > 0) onSave(v);
    else setLocalVal(String(value)); // revert if invalid
  };

  return e('div',null,
    e('div',{style:{color:C.dim,fontSize:9,fontWeight:600,marginBottom:3,textTransform:'uppercase'}},label),
    e('div',{style:{display:'flex',alignItems:'center',gap:5}},
      e('input',{
        type:'text',
        inputMode:'decimal',
        value:localVal,
        onChange:ev=>setLocalVal(ev.target.value),
        onFocus:ev=>{setFocused(true);ev.target.select();},
        onBlur:ev=>{setFocused(false);commit(ev.target.value);},
        onKeyDown:ev=>{if(ev.key==='Enter'){commit(ev.target.value);ev.target.blur();}},
        style:{flex:1,background:C.bg,border:'1px solid '+C.border,borderRadius:7,color:C.text,padding:'6px 9px',fontSize:12,outline:'none',fontFamily:'monospace',fontWeight:700}
      }),
      e('span',{style:{color:C.dim,fontSize:10,minWidth:20}},unit)
    )
  );
}

  const f=data.fire;

  const totalInv=data.inversions.reduce((s,i)=>s+i.valor,0);

  const objectiu=f.despesesAnuals*(100/f.reglaPct);
  const falta=Math.max(0,objectiu-totalInv);
  const progress=Math.min(100,(totalInv/objectiu)*100);

  const estalviA=estalviM*12;

  const edatFire=anysFire!==null?f.edatActual+anysFire:null;
  const rendaM=(objectiu*(f.reglaPct/100))/12;

  return e('div',null,
    e('div',{style:{marginBottom:14}},
      e('div',{style:{color:C.dim,fontSize:10,letterSpacing:1}},'CALCULADORA FIRE 🔥'),
      e('div',{style:{fontSize:18,fontWeight:900,color:C.white}},'Financial Independence, Retire Early'),
      e('div',{style:{color:C.dim,fontSize:11,marginTop:2}},'Regla del ',e('span',{style:{color:C.accent}},`${f.reglaPct}%`),' — necessites ',(100/f.reglaPct).toFixed(0),'x les teves despeses anuals')

        e('div',null,e('div',{style:{color:C.dim,fontSize:9,marginBottom:2}},'Edat FIRE est.'),e('div',{style:{color:edatFire?C.green:C.yellow,fontFamily:'monospace',fontWeight:800,fontSize:14}},edatFire?`${edatFire} anys`:'> 40 anys')),
        e('div',null,e('div',{style:{color:C.dim,fontSize:9,marginBottom:2}},'Renda/mes FIRE'),e('div',{style:{color:C.purple,fontFamily:'monospace',fontWeight:800,fontSize:14}},e(Money,null,fmt(rendaM))))
      ),
      e(ProgressBar,{value:totalInv,max:objectiu,color:progress>=100?C.green:C.accent,height:6}),
      e('div',{style:{display:'flex',justifyContent:'space-between',marginTop:4}},
        e('span',{style:{color:C.dim,fontSize:9}},`${progress.toFixed(1)}% assolit · `,e(Money,null,fmt(totalInv))),
        e('span',{style:{color:C.dim,fontSize:9}},'Falta ',e(Money,null,fmt(falta)))
      )
    ),
    e(Card,{style:{marginBottom:12}},
      e('div',{style:{fontWeight:700,fontSize:10,color:C.dim,marginBottom:10,textTransform:'uppercase'}},'Paràmetres'),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}},
        [['Edat actual','edatActual','anys'],['Despeses anuals','despesesAnuals','€'],['Rendiment esperat','rendimentEsperatPct','%'],['Inflacio','inflacio','%'],['Regla retirada','reglaPct','%']].map(([label,key,unit])=>
          e(FireInput,{key,label,unit,value:f[key],onSave:v=>setF({[key]:v})})
        ),
        e('div',{key:'estalvi'},
          e('div',{style:{color:C.dim,fontSize:9,marginBottom:3,textTransform:'uppercase'}},'Estalvi mensual actual'),

  const issues = [];
  const w = (cat,text,fix) => issues.push({cat,text,fix,sev:'warn'});
  const e2 = (cat,text,fix) => issues.push({cat,text,fix,sev:'err'});
  const inf = (cat,text,fix) => issues.push({cat,text,fix,sev:'info'});

  if(!data.ingressos || data.ingressos===0)
    e2('Ingressos','No has configurat la nomina mensual','Ves a Dashboard i edita la nomina');

  const tFixes = data.gastosFixes.reduce((s,g)=>s+g.import,0);
  if(data.ingressos>0 && tFixes>data.ingressos*0.7)
    e2('Gastos Fixes','Els gastos fixes superen el 70% dels ingressos ('+Math.round(tFixes/data.ingressos*100)+'%)','Revisa si pots reduir algun gasto fix');

  data.gastosFixes.forEach(g=>{
    if(!g.categoria||g.categoria==='Altres') w('Gastos Fixes','El gasto "'+g.nom+'" no te categoria assignada','Edita-lo i assigna una categoria');
    if(g.import<=0) e2('Gastos Fixes','El gasto "'+g.nom+'" te import 0 o negatiu','Elimina-lo o corregeix el import');
  });

  const cats = Object.keys(data.pressupostosVariables||{});
  const mesActual = Object.keys(data.historialVariables||{}).sort().reverse()[0];
  if(mesActual) {
    const mesDades = data.historialVariables[mesActual]||{};
    cats.forEach(cat=>{
      const gastat = mesDades[cat]||0;
      const pressupost = data.pressupostosVariables[cat]||0;
      if(gastat > pressupost*1.2)
        e2('Variables','La categoria "'+cat+'" ha superat el pressupost un '+Math.round((gastat/pressupost-1)*100)+'%','Considera augmentar el pressupost o reduir la despesa');
    });
  }

  data.inversions.forEach(inv=>{
    if(!inv.ticker) inf('Inversions','"'+inv.nom+'" no te ticker assignat','Edita-la i afegeix el ticker per actualitzar preus');
    if(inv.cost>0 && inv.valor<inv.cost*0.5) e2('Inversions','"'+inv.nom+'" ha perdut mes del 50% del valor','Revisa si vols mantenir aquesta posicio');
    if(inv.valor<=0) w('Inversions','"'+inv.nom+'" te valor 0 o negatiu','Actualitza el valor o elimina-la');
  });

  const totalInv = data.inversions.reduce((s,i)=>s+i.valor,0);
  const cripto = data.inversions.filter(i=>i.tipus==='Cripto').reduce((s,i)=>s+i.valor,0);
  if(totalInv>0 && cripto/totalInv>0.4)
    w('Inversions','La cripto representa el '+Math.round(cripto/totalInv*100)+'% de la cartera','Considera diversificar - alta exposicio a cripto es molt volatil');

  data.bens.forEach(b=>{
    if(b.deute>0 && !b.mensualitat) w('Bens','"'+b.nom+'" te deute pero sense mensualitat configurada','Edita-lo i afegeix la mensualitat');
    if(b.deute>b.valorActual) e2('Bens','"'+b.nom+'" te deute superior al valor actual ('+fmt(b.deute-b.valorActual)+' negatiu)','El be te patrimoni net negatiu - revisa les xifres');
    if(b.valorActual<=0) w('Bens','"'+b.nom+'" te valor actual 0','Actualitza el valor de mercat del be');
  });

  data.objectius.forEach(o=>{
    if(o.actual>o.meta) inf('Objectius','"'+o.nom+'" ja ha assolit la meta!','Actualitza la meta o marca-lo com a completat');
    if(o.meta<=0) w('Objectius','"'+o.nom+'" te meta 0 o negativa','Corregeix el import de la meta');
  });

  if(data.ingressos>0) {
    const totalGastos = tFixes + Object.values(data.historialVariables?.[mesKey()]||{}).reduce((s,v)=>s+v,0);
    const estalvi = data.ingressos - totalGastos;
    const taxa = estalvi/data.ingressos;
    if(taxa<0) e2('General','Estas gastant mes del que ingressses (deficit de '+fmt(Math.abs(estalvi))+')','Revisa els gastos variables i fixes');
    else if(taxa<0.1) w('General','Taxa estalvi molt baixa ('+Math.round(taxa*100)+'%)','Es recomana estalviar almenys un 20% dels ingressos');
    else if(taxa>=0.3) inf('General','Excel-lent taxa estalvi ('+Math.round(taxa*100)+'%)','Estàs en bon camí cap a la independència financera');
  }

  if(!data.gastosFixes.length && !data.inversions.length && !data.bens.length)
    inf('General','L app esta buida','Comença afegint els teus gastos fixes, inversions i bens');

  return issues;
}

// ── PIN CHANGE ───────────────────────────────────────────────────────────────
const DEFAULT_PIN = '1234';

function PinChange({onSavePin=()=>{}, currentPin=DEFAULT_PIN}) {
  const [step,setStep] = useState('current'); // current | new | confirm
  const [current,setCurrent] = useState('');
  const [newPin,setNewPin] = useState('');
  const [confirm,setConfirm] = useState('');
  const [msg,setMsg] = useState('');
  const [err,setErr] = useState(false);

  const val = step==='current'?current:step==='new'?newPin:confirm;
  const setVal = step==='current'?setCurrent:step==='new'?setNewPin:setConfirm;

  const labels = {current:'PIN actual',new:'PIN nou (4 digits)',confirm:'Confirma el PIN nou'};

  const pressP = (d) => {
    if(val.length>=4) return;
    const next = val+d;
    setVal(next);
    setErr(false);setMsg('');
    if(next.length===4){
      if(step==='current'){
        const stored = currentPin||DEFAULT_PIN;
        if(next===stored){setStep('new');setCurrent(next);}
        else{setErr(true);setMsg('PIN incorrecte');setTimeout(()=>{setCurrent('');setErr(false);},600);}
      } else if(step==='new'){
        setStep('confirm');
      } else {
        if(next===newPin){
          onSavePin(newPin);
          setMsg('PIN canviat correctament!');
          setStep('current');setCurrent('');setNewPin('');setConfirm('');
        } else {
          setErr(true);setMsg('Els PINs no coincideixen');
          setTimeout(()=>{setConfirm('');setStep('new');setNewPin('');setErr(false);},600);
        }
      }
    }
  };

  const delP = () => setVal(v=>v.slice(0,-1));

  return e('div',null,
    e('div',{style:{color:C.dim,fontSize:11,marginBottom:10}},labels[step]),
    e('div',{style:{display:'flex',gap:10,marginBottom:14,justifyContent:'center'}},
      [0,1,2,3].map(i=>e('div',{key:i,style:{
        width:12,height:12,borderRadius:'50%',
        background:val.length>i?(err?C.red:C.accent):C.border,transition:'background .15s'
      }}))
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,52px)',gap:7,justifyContent:'center'}},
      ['1','2','3','4','5','6','7','8','9','','0','⌫'].map((d,i)=>
        d===''?e('div',{key:i}):
        e('button',{key:i,onClick:()=>d==='⌫'?delP():pressP(d),style:{
          width:52,height:52,borderRadius:12,
          background:d==='⌫'?'transparent':C.bg,
          border:'1px solid '+(d==='⌫'?'transparent':C.border),
          color:d==='⌫'?C.dim:C.text,fontSize:d==='⌫'?16:17,fontWeight:700,
          cursor:'pointer',fontFamily:'inherit'
        }},d)
      )
    ),
    msg && e('div',{style:{color:err?C.red:C.green,fontSize:11,marginTop:10,textAlign:'center',fontWeight:600}},msg)
  );
}
